{{ define "main" }}
<main>
    <article>
        <header>
            <h1>{{ .Title }}</h1>
        </header>
        {{ range .Site.RegularPages.ByPublishDate.Reverse }}
        <div style="display: flex; align-items: center;">
            <h3><a href="{{ .RelPermalink }}" title="{{ .Title }}">{{- .Name -}}</a></h3>
            {{ with .Summary }}
            <p>&nbsp;- {{ . }}</p>
            {{ end }}
        </div>
        {{ end }}
    </article>
</main>
{{ end }}
