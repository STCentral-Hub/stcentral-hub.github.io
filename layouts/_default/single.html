{{ define "main" }}
<main>
    {{- partial "layout/main-header.html" . -}}
    <article>
        {{ with .Summary }}
            <h3 class="content-summary">{{ . }}</h3>
        {{ end }}
        {{ .Content }}
    </article>
    <hr>
    {{- partial "layout/main-footer.html" . -}}
</main>
{{ end }}
