{{ define "main" }}
{{ $lang := .Lang }}
{{ $data := .Site.Data.bps_old }}

<main>
    {{- partial "layout/main-header.html" . -}}
    <article>
        <h3>{{ .Summary }}</h3>
            {{ range $data }}
                {{ partial "blueprint/langFilter.html" (dict "blueprint" . "lang" $lang) }}
            {{ end }}
    </article>
    <hr>
    {{- partial "layout/main-footer.html" . -}}
</main>
{{ end }}
